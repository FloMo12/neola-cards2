<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ece9e3;--w:#ffffff;--tx:#1a1a1a;--sub:#6b6560;--mu:#a09a93;
  --ln:rgba(26,26,26,0.07);--ln2:rgba(26,26,26,0.04);
  --ac:#1B8FD4;--ac2:rgba(27,143,212,0.09);--ac3:rgba(27,143,212,0.18);
  --r:.55em;
}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;
  font-family:"DM Sans",ui-sans-serif,sans-serif;
  -webkit-font-smoothing:antialiased;color:var(--tx)}
.card{width:100%;height:100%;background:var(--bg)}
</style>
</head>
<body>

<style>
.card{display:flex;flex-direction:column;justify-content:center;padding:5.5% 6%;gap:.46em}
.row{
  display:flex;align-items:center;gap:.6em;
  background:var(--w);border-radius:var(--r);
  padding:.68em .85em;border:1px solid var(--ln2);
  border-left:2.5px solid transparent;
  will-change:opacity,transform;
}
.bl2{border-left-color:var(--ac)}
.bo2{border-left-color:#FF9500}
.bg2{border-left-color:#34C759}
.ico{width:1.9em;height:1.9em;border-radius:.32em;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hib{background:var(--ac2)}.hio{background:rgba(255,149,0,.1)}.hig{background:rgba(52,199,89,.1)}
.cat{font-size:.78em;font-weight:500;color:var(--tx);flex-shrink:0;min-width:4.8em}
.sep{width:1px;height:1.2em;background:var(--ln);border-radius:2px;flex-shrink:0}
.chips{display:flex;flex-wrap:nowrap;gap:.4em;flex:1;overflow:hidden}
.chip{border-radius:20px;padding:.28em .7em;font-size:.68em;font-weight:500;white-space:nowrap;flex-shrink:0}
.cb{background:var(--ac2);color:var(--ac)}
.co{background:rgba(255,149,0,.1);color:#c47000}
.cg{background:rgba(52,199,89,.1);color:#1a9038}
.cm{background:var(--ln2);color:var(--mu)}
</style>

<div class="card">
  <div class="row bl2" id="r0">
    <div class="ico hib">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <circle cx="6.5" cy="6.5" r="5" stroke="#1B8FD4" stroke-width="1.2" fill="none"/>
        <path d="M4.5 6.5l1.5 1.5 2.5-3" stroke="#1B8FD4" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="cat">Regelwerk</span>
    <div class="sep"></div>
    <div class="chips">
      <span class="chip cb">Eskalation</span>
      <span class="chip cb">Fristen</span>
      <span class="chip cm">Vorgaben</span>
    </div>
  </div>
  <div class="row bo2" id="r1">
    <div class="ico hio">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 10.5V8l4.5-6 4.5 6v2.5H8V8H5v2.5H2z" stroke="#FF9500" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
      </svg>
    </div>
    <span class="cat">Dienstleister</span>
    <div class="sep"></div>
    <div class="chips">
      <span class="chip co">Wartung</span>
      <span class="chip co">Facility Manager</span>
    </div>
  </div>
  <div class="row bg2" id="r2">
    <div class="ico hig">
      <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
        <path d="M2 9.5C2 9.5 3.5 7 6.5 7s4.5 2.5 4.5 2.5" stroke="#34C759" stroke-width="1.2" stroke-linecap="round" fill="none"/>
        <circle cx="6.5" cy="4.5" r="2" stroke="#34C759" stroke-width="1.2" fill="none"/>
      </svg>
    </div>
    <span class="cat">Tonalität</span>
    <div class="sep"></div>
    <div class="chips">
      <span class="chip cg">Bestimmt</span>
      <span class="chip cg">Verbindlich</span>
      <span class="chip cm">Formell</span>
    </div>
  </div>
</div>

<script>

function scaleFont(base){
  document.documentElement.style.fontSize =
    Math.max(Math.min(document.body.clientWidth/base,22),9)+"px";
}

scaleFont(22);window.addEventListener("resize",()=>scaleFont(22));
const rows=[0,1,2].map(i=>document.getElementById("r"+i));
const S=230, H=2800, DI=560, DO=400;
function run(){
  rows.forEach(r=>{r.style.transition="none";r.style.opacity="0";r.style.transform="translateY(.45em)"});
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    rows.forEach((r,i)=>setTimeout(()=>{
      r.style.transition=`opacity ${DI}ms cubic-bezier(.4,0,.2,1),transform ${DI}ms cubic-bezier(.4,0,.2,1)`;
      r.style.opacity="1";r.style.transform="translateY(0)";
    },i*S));
    const all=2*S+DI;
    setTimeout(()=>{
      rows.forEach(r=>{
        r.style.transition=`opacity ${DO}ms ease,transform ${DO}ms ease`;
        r.style.opacity="0";r.style.transform="translateY(-.3em)";
      });
      setTimeout(run,DO+100);
    },all+H);
  }));
}
setTimeout(run,180);
</script>
</body></html>
