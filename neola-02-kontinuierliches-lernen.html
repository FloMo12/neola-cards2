<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ece9e3;--w:#ffffff;--tx:#1a1a1a;--sub:#6b6560;--mu:#a09a93;
  --ln:rgba(26,26,26,0.07);--ln2:rgba(26,26,26,0.04);
  --ac:#1B8FD4;--ac2:rgba(27,143,212,0.09);--ac3:rgba(27,143,212,0.18);
  --r:.55em;
}
html,body{width:100%;height:100%;overflow:hidden;background:#fff;
  font-family:"DM Sans",ui-sans-serif,sans-serif;
  -webkit-font-smoothing:antialiased;color:var(--tx)}
.card{width:100%;height:100%;background:var(--bg)}
</style>
</head>
<body>

<style>
.card{display:flex;flex-direction:column;align-items:flex-start;justify-content:center;padding:7% 8%;gap:.55em}
.label{font-size:.76em;font-weight:500;color:var(--mu);letter-spacing:.04em;padding:.3em 0}
.bars-wrap{width:100%;flex:1;display:flex;align-items:flex-end;gap:3%;min-height:0}
.bar-col{flex:1;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;gap:.3em}
.bar{width:100%;border-radius:.3em .3em 0 0;height:0%;transition:height .7s cubic-bezier(.4,0,.2,1)}
.bar.dim{background:rgba(27,143,212,.18)}
.bar.lit{background:var(--ac)}
.lbl{font-size:.58em;color:var(--mu);font-weight:400;flex-shrink:0}
.badge{
  display:flex;align-items:center;gap:.4em;
  background:var(--w);border-radius:3em;border:1px solid var(--ln2);
  padding:.38em .9em;font-size:.72em;font-weight:500;color:var(--tx);
  flex-shrink:0;opacity:0;transform:translateY(.35em);
  transition:opacity .6s ease,transform .6s ease;
}
.badge.show{opacity:1;transform:translateY(0)}
.arr{color:var(--ac);font-size:1em;line-height:1}
</style>

<div class="card">
  <div class="label">Operative Effizienz</div>
  <div class="bars-wrap">
    <div class="bar-col"><div class="bar dim" data-h="30"></div><div class="lbl">KW1</div></div>
    <div class="bar-col"><div class="bar dim" data-h="41"></div><div class="lbl">KW2</div></div>
    <div class="bar-col"><div class="bar dim" data-h="53"></div><div class="lbl">KW3</div></div>
    <div class="bar-col"><div class="bar dim" data-h="62"></div><div class="lbl">KW4</div></div>
    <div class="bar-col"><div class="bar lit" data-h="72"></div><div class="lbl">KW5</div></div>
    <div class="bar-col"><div class="bar lit" data-h="84"></div><div class="lbl">KW6</div></div>
    <div class="bar-col"><div class="bar lit" data-h="97"></div><div class="lbl">KW7</div></div>
  </div>
  <div class="badge" id="badge"><span class="arr">↑</span><span>+38 % Genauigkeit über Zeit</span></div>
</div>

<script>

function scaleFont(base){
  document.documentElement.style.fontSize =
    Math.max(Math.min(document.body.clientWidth/base,22),9)+"px";
}

scaleFont(26);window.addEventListener("resize",()=>scaleFont(26));
const bars=[...document.querySelectorAll(".bar")];
const badge=document.getElementById("badge");
const S=100, H=2800;

function run(){
  bars.forEach(b=>{b.style.transition="none";b.style.height="0%"});
  badge.classList.remove("show");badge.style.transition="none";badge.style.opacity="0";badge.style.transform="translateY(.35em)";
  requestAnimationFrame(()=>requestAnimationFrame(()=>{
    bars.forEach((b,i)=>setTimeout(()=>{
      b.style.transition="height .7s cubic-bezier(.4,0,.2,1)";
      b.style.height=b.dataset.h+"%";
    },i*S));
    const after=bars.length*S+720;
    setTimeout(()=>{badge.style.transition="opacity .6s ease,transform .6s ease";badge.classList.add("show")},after);
    setTimeout(()=>{
      bars.forEach(b=>{b.style.transition="height .45s ease";b.style.height="0%"});
      badge.style.transition="opacity .35s ease";badge.style.opacity="0";
      setTimeout(run,500);
    },after+600+H);
  }));
}
setTimeout(run,180);
</script>
</body></html>
